networks:
  default: # Not used, but mentioned because it'll be created by docker compose anyway.

volumes:
  docker-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1k,uid=65534,mode=0700,noexec"
  netdata-lib:
  netdata-cache:

services:
  docker-socket-proxy:
    image: "wollomatic/socket-proxy:1.11.4"
    healthcheck:
      test: ["CMD", "./healthcheck"]
    container_name: "docker-socket-proxy"
    restart: always
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    user: "65534:${GID_DOCKER:?}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "docker-socket:/socket/"
    command:
      - '-allowhealthcheck'
      - '-watchdoginterval=60'
      - '-stoponwatchdog'
      - '-proxysocketendpoint=/socket/docker.sock'
      - '-proxysocketendpointfilemode=0666'
      # PING, VERSION, EVENTS - Mostly harmless and almost required for any service.
      # CONTAINERS - For Netdata.
      # INFO, IMAGES - For Netdata go.d docker plugin.
      - '-allowHEAD=(/v1\.\d\d)?/_ping'
      - '-allowGET=(/v1\.\d\d)?/(_ping|version|events|info|containers/.*|images/.*)'

  netdata:
    build:
      context: "netdata"
      args:
        UID_POSTFIX: "${UID_POSTFIX:?}"
        GID_POSTFIX: "${GID_POSTFIX:?}"
        GID_POSTDROP: "${GID_POSTDROP:?}"
        GID_SHOWPID: "${GID_SHOWPID}"
    container_name: "netdata"
    restart: always
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
      - SYS_RAWIO # smartctl
    security_opt:
      - "apparmor:unconfined"
    devices:
      - "/dev/nvme0n1:/dev/nvme0n1" # nvme
      - "/dev/sda:/dev/sda" # smartctl
      - "/dev/sdb:/dev/sdb" # smartctl
      - "/dev/sdc:/dev/sdc" # smartctl
      - "/dev/sdd:/dev/sdd" # smartctl
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia # Require extra setup in host's /etc/docker/daemon.json.
              count: all
              capabilities: [gpu]
    network_mode: host
    volumes:
      - "/dev/log:/dev/log:ro"
      - "netdata-lib:/var/lib/netdata"
      - "netdata-cache:/var/cache/netdata"
      - "/etc/passwd:/host/etc/passwd:ro"
      - "/etc/group:/host/etc/group:ro"
      - "/etc/localtime:/etc/localtime:ro"
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/etc/os-release:/host/etc/os-release:ro"
      - "/var/log:/host/var/log:ro"
      - "/var/spool/postfix:/var/spool/postfix:ro"
      - "/boot:/boot:ro" # disk usage
      - "/run:/host/run:ro" # disk usage
      - "/mnt:/mnt:ro" # disk usage
      - "/usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro"
      - "/etc/sv/dhcpd/root/var/lib/dhcp/dhcpd.leases:/var/lib/dhcp/dhcpd.leases:ro" # isc_dhcpd
      - "/usr/local/share/ca-certificates:/usr/local/share/ca-certificates:ro" # x509check, httpcheck
      - "docker-socket:/socket/:ro" # docker-socket-proxy
    environment:
      DOCKER_HOST: "unix:///socket/docker.sock" # docker-socket-proxy
      DISABLE_TELEMETRY: "1"
      TG_CHAT_ID: "${NETDATA_TG_CHAT_ID:?}"
      TG_TOKEN: "${NETDATA_TG_TOKEN:?}"
      HTTPCHECK_TR_PASSWORD: "${NETDATA_HTTPCHECK_TR_PASSWORD:?}"

  ollama:
    image: "ollama/ollama:0.18.2"
    container_name: "ollama"
    healthcheck:
      test: >-
        timeout -s KILL 5 bash -c '
          exec <>/dev/tcp/127.0.0.1/11434 &&
          echo -e "GET / HTTP/1.0\r\n\r\n" >&0 &&
          grep -q "Ollama is running"'
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia # Require extra setup in host's /etc/docker/daemon.json.
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - "/mnt/ollama:/root/.ollama:rw"
