# Alerts for Postfix mail flow monitoring.
# Data source: go.d/prometheus scraping postfix-exporter on port 9154.

# Postfix exporter cannot read log file or connect to showq socket.
    template: postfix_source_down
          on: prometheus.postfix.postfix_up
       class: Errors
        type: Linux
   component: Postfix
        calc: $postfix_up
       units: boolean
       every: 1m
        crit: $this == 0
       delay: down 5m multiplier 1.5 max 1h
     summary: Postfix data source is down
        info: postfix_exporter cannot access a Postfix data source
          to: sysadmin
