# Override the built-in alert to tolerate brief DNS hiccups.
# Single packet loss on UDP is normal; only alert on sustained failures.

 template: dns_query_query_status
       on: dns_query.query_status
    class: Errors
     type: DNS
component: DNS
   lookup: average -1m unaligned of success
    units: status
    every: 10s
     warn: $this != nan && $this < 0.5
    delay: up 30s down 5m multiplier 1.5 max 1h
  summary: DNS query unsuccessful requests to ${label:server}
     info: DNS request type ${label:record_type} to server ${label:server} is unsuccessful
       to: sysadmin
