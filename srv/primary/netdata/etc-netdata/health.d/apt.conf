# Alerts for system package updates (unattended-upgrades).
# Data source: go.d/filecheck monitoring host files via bind mounts.

    template: apt_reboot_required
          on: filecheck.file_existence
       class: Errors
        type: Linux
   component: APT
chart labels: file_path=*/reboot-required
        calc: $exist
       units: boolean
       every: 5m
        warn: $this == 1
       delay: down 30m multiplier 1.5 max 2h
     summary: Reboot required after package update
        info: System requires a reboot to complete package updates
          to: sysadmin

    template: apt_updates_stale
          on: filecheck.file_modification_time_ago
       class: Errors
        type: Linux
   component: APT
chart labels: file_path=*/update-success-stamp
        calc: $mtime_ago
       units: seconds
       every: 1h
        warn: $this > 259200
        crit: $this > 604800
       delay: down 1h multiplier 1.5 max 12h
     summary: APT updates have not run recently
        info: No successful apt update in over 3 days (warn) or 7 days (crit)
          to: sysadmin

    template: apt_updates_missing
          on: filecheck.file_existence
       class: Errors
        type: Linux
   component: APT
chart labels: file_path=*/update-success-stamp
        calc: $exist
       units: boolean
       every: 1h
        crit: $this == 0
       delay: down 1h multiplier 1.5 max 12h
     summary: APT update-success-stamp missing
        info: The apt periodic update stamp file does not exist
          to: sysadmin
