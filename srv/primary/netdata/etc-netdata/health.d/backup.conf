# Alerts for duplicity backup and S3 storage monitoring.
# Data sources: go.d/prometheus reading /prom/backup.prom,
# go.d/filecheck monitoring /prom/backup.prom file age.

# Backup has not run in over 25 hours (runs daily).
    template: backup_stale
          on: filecheck.file_modification_time_ago
       class: Errors
        type: Linux
   component: Backup
chart labels: file_path=*/backup.prom
        calc: $mtime_ago
       units: seconds
       every: 1h
        warn: $this > 90000
        crit: $this > 180000
       delay: down 1h multiplier 1.5 max 12h
     summary: Backup has not run recently
        info: No successful backup run in over 25 hours (warn) or 50 hours (crit)
          to: sysadmin

# Backup metrics file is missing (never ran or volume lost).
    template: backup_missing
          on: filecheck.file_existence
       class: Errors
        type: Linux
   component: Backup
chart labels: file_path=*/backup.prom
        calc: $exist
       units: boolean
       every: 1h
        crit: $this == 0
       delay: down 1h multiplier 1.5 max 12h
     summary: Backup metrics file missing
        info: The backup prometheus metrics file does not exist
          to: sysadmin

# Any backup profile exited with non-zero code.
    template: backup_failed
          on: prometheus.backup.backup_exit_code
       class: Errors
        type: Linux
   component: Backup
        calc: $backup_exit_code
       units: exit_code
       every: 1h
        crit: $this != 0
       delay: down 1h multiplier 1.5 max 12h
     summary: Backup failed
        info: A backup profile exited with a non-zero exit code
          to: sysadmin

# Duplicity reported errors during backup.
    template: backup_errors
          on: prometheus.backup.backup_errors
       class: Errors
        type: Linux
   component: Backup
        calc: $backup_errors
       units: errors
       every: 1h
        warn: $this > 0
       delay: down 1h multiplier 1.5 max 12h
     summary: Backup completed with errors
        info: Duplicity reported errors during backup
          to: sysadmin

# S3 backup bucket is empty (data loss or misconfiguration).
      alarm: s3_bucket_empty
         on: prometheus.backup.s3_bucket_objects_total
      class: Errors
       type: Linux
  component: Backup
       calc: $s3_bucket_objects_total
      units: objects
      every: 1h
       crit: $this == 0
      delay: down 1h multiplier 1.5 max 12h
    summary: S3 backup bucket is empty
       info: Backup target contains zero objects — possible data loss or misconfiguration
         to: sysadmin

# S3 Spaces approaching billing limit (250 GB included, overage costs extra).
      alarm: s3_bucket_quota
         on: prometheus.backup.s3_bucket_size_bytes
      class: Errors
       type: Linux
  component: Backup
       calc: $s3_bucket_size_bytes
      units: bytes
      every: 1h
       warn: $this > 230*1000*1000*1000
       crit: $this > 250*1000*1000*1000
      delay: down 1h multiplier 1.5 max 12h
    summary: S3 Spaces approaching quota
       info: Backup storage approaching 250 GB billing limit (warn 230 GB, crit 250 GB)
         to: sysadmin
