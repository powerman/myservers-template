## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/whoisquery#readme

jobs:
  # The = prefix is required: without it whois.nic.name does not return the expiry date,
  # causing Netdata to retry with = anyway, making 2 slow requests instead of one.
  # Timeout is increased because Netdata follows the referral to whois.namecheap.com,
  # which accepts connections but responds slowly (~11s).
  - name: example.com
    source: '= example.com'
    timeout: 30s
