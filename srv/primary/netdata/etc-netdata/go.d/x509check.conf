## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/plugin/go.d/collector/x509check#readme

jobs:
  - name: example.com
    source: 'https://example.com:443'

  - name: smtp.primary.example.com
    source: 'smtp://smtp.primary.example.com:25'

  - name: smtp.primary.example.com:587
    source: 'smtp://smtp.primary.example.com:587'

  - name: smtp.primary.example.com:465
    source: 'tcp://smtp.primary.example.com:465'

  - name: pop3.example.com
    source: 'file:///tls/caddy/certificates/acme-v02.api.letsencrypt.org-directory/pop3.example.com/pop3.example.com.crt'

  - name: imap.example.com
    source: 'file:///tls/caddy/certificates/acme-v02.api.letsencrypt.org-directory/imap.example.com/imap.example.com.crt'

  - name: primary.example.com
    source: 'https://primary.example.com:443'

  - name: netdata.primary.example.com
    source: 'https://netdata.primary.example.com:443'

  - name: netdata.secondary.example.com
    source: 'https://netdata.secondary.example.com:443'

  - name: smtp.secondary.example.com
    source: 'smtp://smtp.secondary.example.com:25'
