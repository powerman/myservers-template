name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'

# Cancel testing of a previous commit for the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Free disk space
        run: |
          # This is needed to fix 'out of disk space' while building ollama for srv/homelab.
          echo "Disk space before cleanup:"
          df -h /
          echo "Removing unnecessary software..."
          du -sh /usr/share/dotnet || true
          sudo rm -rf /usr/share/dotnet
          du -sh /usr/local/lib/android || true
          sudo rm -rf /usr/local/lib/android
          du -sh "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Running docker system prune..."
          docker system prune -af --volumes
          echo "Disk space after cleanup:"
          df -h /

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full history

      - uses: docker/setup-buildx-action@v4

      - uses: jdx/mise-action@v4
      - run: git reset --hard # Work around https://github.com/jdx/mise/discussions/8270.

      - run: mise run ci
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_SHA: ${{ github.sha }}
